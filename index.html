<!DOCTYPE html>
<html>
<head>
	<title>bootstrap</title>

	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

	<link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">

	<link rel="stylesheet" href="style.css">

<style>

	body,
	html {
	width: 100%;
	height: 100%; 
	}

	body {
	font-family: 'Montserrat', sans-serif;
	}

	hr {
	max-width: 65px;
	border-width: 3px;
	border-color: #F05F44; 
	}

	.faded {
	color: rgba(255, 255, 255, 0.8); 
	}

	header.startup {
	background-position: center;
	background-image: url("img/header.jpg");
	background-size: cover;
	height: 100%;
	}

	header.startup hr {
	margin-top: 200px;
	margin-bottom: 30px; 
	}

	header.startup h1 {
	font-size: 2rem; 
	}

	.btn {
	font-weight: 700;
	text-transform: uppercase;
	border-radius: 300px;
	font-family: 'Montserrat', sans-serif;
	}

	.btn-xl {
	padding: 1rem 2rem; 
	}

	.btn-primary {
	background-color: #F05F44;
	border-color: #F05F44;
	transition: all 1s;
	 }

	.btn-primary:hover {
	background-color: #ee4b08;
	border-color: #ee4b08;
	/* border-width: 5px; */
	cursor: pointer;
	transform: scale(1.1) ;
	
	}


</style>

</head>
<body>

	<header class="startup text-center text-white d-flex">
		<div class="container my-auto">
			<div class="row">
				<div class="col-lg-12 my-auto">
					<h1 class="text-uppercase faded">
						<strong>the biggest startup event of the year</strong>
					</h1>
					<hr>
				</div>

				<div class="col-lg-12 my-auto">

						<form action="https://gmail.us20.list-manage.com/subscribe/post?u=53008fe7a2cb744f4a4c4fac1&amp;id=f9d31fba68" method="post" id="mc-embedded-subscribe-form" name="mc-embedded-subscribe-form" class="validate" target="_blank" novalidate>
							<div id="mc_embed_signup_scroll">
							<input type="submit" value="Find Out More" name="subscribe" id="mc-embedded-subscribe" class="btn btn-primary btn-xl"></div>
						</form>

				</div>
			</div>
		</div>
	</header>
	
	
	
	

	<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
